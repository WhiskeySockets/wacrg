requires: [ call-offer, call-accept ]
references: []
open_questions:
  - "Whether the server or peer behaves differently when <preaccept> is omitted
    versus sent (e.g. caller-side ringing UI/timeout), and whether it is ever
    mandatory."
  - "Whether <preaccept> may carry additional children (e.g. <video>, <net>) for
    video calls, as its <audio>-only shape is observed for audio calls."
  - "Full meaning of the packed <capability> bitfield and the significance of
    the differing final byte."
discovered_by: vinikjkkj
code: SIG-04
