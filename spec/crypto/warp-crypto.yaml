    }
open_questions:
  - "Whether the receiver is ever required to verify the WARP MI tag, and what
    action a mismatch triggers."
  - "The full meaning of the 0x30010000 piggyback word beyond signalling MI
    presence, and the video-stream piggyback schedule (only the audio schedule
    is pinned)."
  - "Whether the empty-extension-then-piggyback start offset (index >= 2) is
    fixed on the wire or negotiable."
code: CRY-07
