open_questions:
  - "Full inbound ROC-recovery (rollover) algorithm for out-of-order and wrapped
    sequence numbers."
  - "Whether the WARP MI tag is verified on receive in the production client,
    and the failure policy if it is."
  - "Send-side pacing / DTX and comfort-noise behavior during the Active phase."
  - "Exact retransmission/jitter-buffer handling on the receive path."
