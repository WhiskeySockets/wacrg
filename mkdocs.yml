site_name: WhatsApp Calls Research Group
site_description: >-
  A collaborative, GitHub-native, machine-readable specification of the
  WhatsApp 1:1 call protocol — signaling, keying, media, and transport.
# Canonical site URL. The site is served at the apex of the custom domain
# (see docs/CNAME), so links resolve from the domain root, not a /wacrg/ subpath.
site_url: https://wacrg.org/
repo_url: https://github.com/WhiskeySockets/wacrg
repo_name: WhiskeySockets/wacrg
docs_dir: docs

# The ADR template is a contributor scaffold, not a standalone page. It stays in
# the repo (decisions/index.md links to it) but is intentionally kept out of the
# nav; declaring it here keeps the build free of "omitted from nav" warnings.
not_in_nav: |
  /decisions/_TEMPLATE.md

theme:
  name: material
  # Serves overrides/404.html as site/404.html (GitHub Pages' not-found page).
  custom_dir: overrides
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - content.code.copy
    - toc.follow
  palette:
    - scheme: default
      primary: green
      accent: teal
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: green
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

plugins:
  - search
  - awesome-pages

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  # Inline icons (e.g. :material-github:) rendered as SVG by mkdocs-material.
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        # Render ```mermaid fenced blocks as diagrams (mkdocs-material loads
        # mermaid.js automatically when this fence is registered).
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
