open_questions:
  - "Semantic meaning of each of the nine slots (which slot carries audio vs.
    video vs. screen-share, and primary vs. RTX/FEC) is not pinned by the
    source."
  - "Whether the slot-word permutation is fixed for all client versions or
    negotiated/versioned."
references:
