# Ingest flavor-registration issues into the corpus.
# When an issue carrying the `type/flavor-registration` label is opened or edited,
# run the ingest script to turn the Issue Form body into spec/flavors/<id>.yaml
# (and an <id>.map.yaml if a coverage map was supplied), then open a pull request
# for review. A guard `if` ensures the job only runs for flavor-registration issues.

name: Flavor to corpus

on:
  issues:
    types: [opened, edited]

# Needs to push a branch (contents) and open a PR (pull-requests).
permissions:
  contents: write
  pull-requests: write

concurrency:
  # One ingest run per issue at a time.
  group: flavor-to-corpus-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  ingest:
    name: Ingest flavor registration
    runs-on: ubuntu-latest
    # Only process issues labeled type/flavor-registration.
    if: contains(github.event.issue.labels.*.name, 'type/flavor-registration')
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm i

      - name: Ingest flavor registration into corpus
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          # The authenticated GitHub identity of the submitter — recorded as the
          # flavor's maintainer (a vendor attaches itself to the spec, GitHub-authenticated).
          ISSUE_AUTHOR: ${{ github.event.issue.user.login }}
        run: npm run ingest:flavor

      - name: Regenerate docs from the corpus
        run: npm run build

      - name: Create pull request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: attach/flavor-issue-${{ github.event.issue.number }}
          base: main
          commit-message: "feat(flavors): register flavor from issue #${{ github.event.issue.number }}"
          title: "Register flavor from issue #${{ github.event.issue.number }}: ${{ github.event.issue.title }}"
          body: |
            Automated ingestion of flavor-registration issue
            #${{ github.event.issue.number }} into the corpus.

            This PR was generated by the `flavor-to-corpus` workflow, which parsed the
            Issue Form body via `scripts/ingest-flavor.ts` and wrote a flavor under
            `spec/flavors/` (with an `<id>.map.yaml` if a coverage map was supplied),
            then regenerated the docs.

            Please review the generated flavor for accuracy — especially `maturity`,
            `basis`, and `derives_from` (a port is not independent of its upstream) —
            and pin any coverage-map permalinks to a commit SHA before merging.

            Closes #${{ github.event.issue.number }}
          labels: |
            type/flavor-registration
            automated
          delete-branch: true
