id: meowmeow
name: meowmeow (Go VoIP reference)
language: go
maturity: working
maintainer: purpshell
status: stable
covers:
  - keying
  - media
basis:
  - wasm-analysis
description: >
  A Go reconstruction of the WhatsApp VoIP media stack, including a byte-exact
  MLow/SMPL CELP codec reverse-engineered op-by-op from the WhatsApp WASM and
  pinned against captured WASM decode vectors. The original reference the
  whatsapp-rust MLow codec was ported from. An independent reconstruction, not an
  evidence-gathering tool.
