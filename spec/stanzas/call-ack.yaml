id: call-ack
tag: ack
display_name: Call Acknowledgement / Receipt
category: signaling
direction: [outgoing, incoming]
status: draft
spec_version: "0.1.0"
summary: >
  A server-generated acknowledgement confirming receipt of a call stanza. Like the rest
  of WhatsApp multi-device, call signaling is reliable: after a device sends a <call>
  (offer, accept, reject, terminate, transport, mute, etc.), the server replies with an
  <ack> echoing the original stanza id and class so the sender knows it was delivered into
  the routing fabric. A peer device may likewise be expected to ack certain call stanzas
  it receives. The <ack> tag is shared across the whole protocol (messages, receipts,
  etc.); this entry documents the call-signaling-specific usage where class="call". The
  attribute set largely mirrors generic WA acks and is modelled with moderate confidence.
attributes:
  - name: id
    type: string
    required: true
    confidence: probable
    description: >
      Echoes the id of the <call> stanza being acknowledged, letting the original sender
      match the ack to its outstanding stanza.
    provenance:
      techniques: [websocket-capture]
      sources: []
  - name: class
    type: string
    required: true
    confidence: probable
    description: >
      Stanza class being acknowledged; for call signaling this is "call". Reuses the same
      class attribute seen on message/receipt acks elsewhere in the protocol.
    observed_values: ["call"]
    provenance:
      techniques: [websocket-capture]
      sources: []
  - name: from
    type: jid
    required: false
    confidence: probable
    description: >
      Originating address of the ack. For server acks this is typically the server JID
      (s.whatsapp.net); for peer-to-peer acks it is the acking device.
    observed_values: ["s.whatsapp.net"]
    provenance:
      techniques: [websocket-capture]
      sources: []
  - name: to
    type: jid
    required: false
    confidence: speculative
    description: Destination of the ack (the device that sent the acknowledged stanza).
    provenance:
      techniques: [websocket-capture]
      sources: []
  - name: type
    type: string
    required: false
    confidence: speculative
    description: >
      Sub-type of the ack, when present. Some call stanzas may be acknowledged with a
      type qualifier (mirroring how message receipts carry types). Vocabulary unconfirmed.
    provenance:
      techniques: [websocket-capture]
      sources: []
  - name: t
    type: timestamp
    required: false
    confidence: speculative
    description: Server timestamp at which the ack was generated (epoch seconds).
    provenance:
      techniques: [websocket-capture]
      sources: []
children:
  - tag: error
    occurrence: "0..1"
    confidence: speculative
    description: >
      Optional error detail when the acknowledged stanza could not be routed/accepted
      (e.g. callee offline, stanza malformed). Mirrors the <error> child seen on failed
      message acks. Presence on call acks is unconfirmed.
    attributes:
      - name: code
        type: int
        required: false
        confidence: speculative
        description: Numeric error code (HTTP-like) describing the failure.
        observed_values: ["404", "503"]
        provenance:
          techniques: [websocket-capture]
          sources: []
      - name: text
        type: string
        required: false
        confidence: speculative
        description: Human-readable error text.
        provenance:
          techniques: [websocket-capture]
          sources: []
examples:
  - title: Illustrative server ack for a call offer (synthetic)
    note: Synthetic and sanitized — not a real capture.
    format: xml
    body: |
      <ack id="OF-0001" class="call" from="s.whatsapp.net" t="1700000000"/>
  - title: Illustrative ack carrying a routing error (synthetic)
    note: Synthetic and sanitized — not a real capture; error framing on call acks is unconfirmed.
    format: xml
    body: |
      <ack id="OF-0002" class="call" from="s.whatsapp.net">
        <error code="503" text="service unavailable"/>
      </ack>
notes: >
  The ack is the reliability backbone of call signaling: absence of an ack within a
  timeout is what drives client-side retransmission of offers and other control stanzas.
  Note this stanza's tag is <ack>, not <call> — it is the server/peer response to a call
  stanza rather than a call stanza itself.
open_questions:
  - Do peer devices ack received call stanzas, or only the server?
  - Which call stanzas (beyond the offer) elicit an explicit ack versus being best-effort?
  - Does the <error> child appear on call acks, and what is its code vocabulary?
  - Is there a distinct <receipt> stanza for calls, separate from <ack>?
references: []
