open_questions:
  - "The assumed main bitrate (20000 bps) for the active 1:1 config is not
    recovered from the wire; it drives the per-subframe pulse budget and gain
    selection, so a different negotiated rate would change the chosen pulse
    counts and gains."
  - "The bitrate controller's per-subframe weighted target energy uses the
    residual energy as a proxy for the perceptually-weighted speech energy; the
    exact `wnrg` derivation is unspecified."
  - "Only the active config-0 (0x50) frame is specified; the encode path for
    config 1, the 32 kHz internal rate, and frame sizes other than 60 ms is not
    characterized."
  - "DTX/SID frame generation is described only at the TOC level here; the
    comfort-noise descriptor payload an MLow encoder emits during silence is not
    specified."
