      flavor: whatsapp-rust,
      status: working,
      note: "listen mode default-rejects: acks the offer, then sends <reject> with no
        media work",
      commits: [ d68af6c608297c864669850b9bc05d4a54410d15 ]
    }
  - {
      flavor: zapo-caller,
      status: working,
      note: "reject builder ported from zapo-caller signaling.ts"
    }
open_questions:
  - "Whether the caller emits a terminate or notice to the callee's sibling
    devices once one device rejects, or whether each device rejects
    independently with no cross-device fan-out."
  - "Whether a rejecting device must wait for the offer receipt to be sent
    before emitting <reject>, or whether the two may be pipelined."
  - "Whether the caller surfaces a distinct call-state (declined vs. unanswered)
    on receiving <reject> versus a missed-call timeout (see flow-call-missed)."
references:
  - {
      title: "RFC 2119 — Key words for use in RFCs",
      url: "https://www.rfc-editor.org/rfc/rfc2119"
    }
discovered_by: vinikjkkj
