open_questions:
  - "Exact byte layout of participantLID used as HKDF info across client
    versions (shared with srtp-master-key)."
  - "Whether the 4-byte WARP MESSAGE-INTEGRITY tag is verified by the production
    receiver, or only emitted on send."
  - "Conditions under which keygen-v2 (<raw_e2e>) is selected over the
    callKey-derived IKM."
