open_questions:
  - "Whether any client emits an optional <reject> attribute (e.g. a reason or
    media-type hint) under newer protocol versions; none is observed in the
    current builders or parser."
  - "Whether the caller forwards a reject-derived terminate to other callee
    devices, or whether each device rejects independently."
