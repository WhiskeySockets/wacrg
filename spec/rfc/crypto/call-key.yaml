open_questions:
  - "How the caller generates the 32-byte call key (CSPRNG source / any
    structure) is not revealed by the keying code, which only consumes it."
  - "Exact serialization of the Signal plaintext that carries the call key, and
    how raw_e2e is framed alongside it under keygen=2."
  - "Whether the call key is regenerated per offer or reused across re-offers /
    call legs."
discovered_by: vinikjkkj
