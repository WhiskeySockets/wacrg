id: call-accept
tag: call
display_name: Call Accept
category: signaling
direction: [outgoing, incoming]
status: draft
spec_version: "0.1.0"
summary: >
  Sent by the callee device when the user answers the call. The <call> node wraps an
  <accept> child that echoes the call-id and call-creator from the original offer and
  carries the callee's own keying material and transport candidates so media can
  begin flowing. From the answering device's perspective this is outgoing; from the
  caller's it is incoming. Acceptance is exclusive in multi-device: once one of the
  callee's devices accepts, the others receive a terminate with reason
  accept_elsewhere (see enum:terminate-reasons). All details below are a working
  model, not yet confirmed by a real capture.
attributes:
  - name: from
    type: jid
    required: true
    confidence: probable
    description: >
      JID of the accepting device. On the wire the server may stamp/augment this so
      the caller learns which specific companion device answered.
    observed_values: ["B.0:7@s.whatsapp.net"]
    provenance:
      techniques: [websocket-capture]
      sources: []
  - name: to
    type: jid
    required: true
    confidence: probable
    description: JID of the original caller account/device the acceptance is routed to.
    observed_values: ["A@s.whatsapp.net"]
    provenance:
      techniques: [websocket-capture]
      sources: []
  - name: id
    type: string
    required: true
    confidence: probable
    description: Stanza id used to correlate the server <ack> for this acceptance.
    observed_values: ["2B3C4D5E6F"]
    provenance:
      techniques: [websocket-capture]
      sources: []
children:
  - tag: accept
    occurrence: "1"
    confidence: probable
    description: >
      Container confirming the call. Echoes the session identifiers from the offer
      and, in most call designs, carries the callee's keying contribution and its
      own transport endpoints so the SRTP session can be completed.
    attributes:
      - name: call-id
        type: string
        required: true
        confidence: probable
        description: The logical call session id, copied verbatim from the originating offer.
        observed_values: ["CALLID-0001-synthetic"]
        provenance:
          techniques: [websocket-capture, baileys-instrumentation]
          sources: []
      - name: call-creator
        type: jid
        required: true
        confidence: probable
        description: JID of the call creator (the caller), copied from the offer for attribution.
        observed_values: ["A@s.whatsapp.net"]
        provenance:
          techniques: [websocket-capture]
          sources: []
    children:
      - tag: enc
        occurrence: "0..n"
        confidence: speculative
        description: >
          Optional keying payload from the callee back to the caller's device(s),
          again wrapped in the Signal session. Whether the callee re-sends keying on
          accept (versus the offer's key being authoritative) is unconfirmed; some
          designs use the accept purely as a confirmation and rely on the offer key.
        attributes:
          - name: v
            type: int
            required: false
            confidence: speculative
            description: Envelope/version of the enc payload format.
            observed_values: [2]
            provenance:
              techniques: [websocket-capture]
              sources: []
          - name: type
            type: string
            required: false
            confidence: speculative
            description: Signal message type (pkmsg or msg), as on the offer's enc node.
            observed_values: ["msg", "pkmsg"]
            provenance:
              techniques: [websocket-capture, baileys-instrumentation]
              sources: []
      - tag: destination
        occurrence: "0..1"
        confidence: speculative
        description: >
          The callee's chosen/advertised transport endpoints, mirroring the offer's
          <destination>. Lets both sides converge on a relay for the SRTP-over-UDP
          media path.
        children:
          - tag: te
            occurrence: "0..n"
            confidence: speculative
            description: A transport endpoint candidate advertised by the callee.
            attributes:
              - name: ip
                type: string
                required: false
                confidence: speculative
                description: Candidate IP address (synthetic example only).
                observed_values: ["203.0.113.20"]
                provenance:
                  techniques: [websocket-capture]
                  sources: []
              - name: port
                type: int
                required: false
                confidence: speculative
                description: Candidate UDP port for media.
                observed_values: [3478]
                provenance:
                  techniques: [websocket-capture]
                  sources: []
examples:
  - title: Illustrative call acceptance (synthetic)
    note: >
      Synthetic and sanitized — not a real capture. Whether <accept> carries its own
      <enc>/<destination> or is a bare confirmation is an open question; both are
      shown for illustration.
    format: xml
    body: |
      <call from="B.0:7@s.whatsapp.net" to="A@s.whatsapp.net" id="2B3C4D5E6F">
        <accept call-id="CALLID-0001-synthetic" call-creator="A@s.whatsapp.net">
          <enc v="2" type="msg"><!-- optional callee keying contribution --></enc>
          <destination>
            <te ip="203.0.113.20" port="3478"/>
          </destination>
        </accept>
      </call>
notes: >
  Acceptance flips the session from "ringing" to "connected". The other companion
  devices of the callee should observe a terminate (reason accept_elsewhere) once
  this stanza is processed, which is the multi-device fork-resolution behaviour.
open_questions:
  - Does <accept> carry keying material, or is the offer's media key authoritative for the whole call?
  - Are transport candidates exchanged in <accept>, or only via later <transport> updates?
  - Is there an attribute distinguishing audio-only acceptance from accepting a video upgrade?
references:
  - title: Signal Protocol overview
    url: https://signal.org/docs/
