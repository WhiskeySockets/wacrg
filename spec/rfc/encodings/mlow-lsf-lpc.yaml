open_questions:
  - "The selector/grid/stage-2 CDF tables and the stage-1/stage-2 codebooks
    (cbhalf, we, wie, qstep, min_qi/max_qi, min_dist, means, reg_cond) are
    carried as opaque table blobs; their generating procedure inside the codec
    is not specified here."
  - "Whether interpolation rows other than row 0 ([0.55,0.88,1.0,1.0]) are ever
    signalled/used on the decode path, or only chosen encoder-side."
