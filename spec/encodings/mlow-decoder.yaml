open_questions:
  - "Whether the 32 kHz internal rate and the 10/20/120 ms active frame sizes
    ever drive the active-frame decode in live calls, or only 16 kHz / 60 ms
    frames occur (only the latter is seen in capture)."
  - "Comfort-noise generation for SID/inactive frames: the decoder currently
    emits pure silence rather than synthesizing comfort noise from the SID
    descriptor."
  - "Whether RED redundancy beyond the main (last) frame is ever used for loss
    concealment, or the older frames are always discarded after
    de-packetization."
