id: meowmeow
name: meowmeow (Go VoIP reference)
techniques:
  - wasm-analysis
maintainer: purpshell
description: >
  A Go reconstruction of the WhatsApp VoIP media stack, including a byte-exact
  MLow/SMPL CELP codec reverse-engineered op-by-op from the WhatsApp WASM and
  pinned against captured WASM decode vectors. The reference the whatsapp-rust
  MLow codec was ported from.
