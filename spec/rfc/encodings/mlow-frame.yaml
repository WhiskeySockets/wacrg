open_questions:
  - "Semantics of flag0 (bit 0) — present in the TOC but not consumed by the
    decode path."
  - "Whether the 32 kHz internal rate (bit 5 = 1) and the 10/20/120 ms frame
    sizes occur in live calls, or are reserved; only 16 kHz / 60 ms active
    frames are seen in capture."
  - "Exact role of flag2 beyond selecting config 0 vs 1 for the active-frame
    decode."
