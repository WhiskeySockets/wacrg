id: video
category: encodings
title: Video codec
status: draft
order: 30
features: [ video, screen-share ]
since: "0.1.0"
summary: >
  Video and screen-share tracks are carried as H.264; profile/level negotiation
  and packetization mode are not yet specified.
normative: |
  Video tracks MUST be H.264. The engine exposes an H.26x
  passthrough/packetizer path (`wa_h26x_passthrough`, `h26x_packetizer`)
  operating on H.264 NAL units.

  TODO: H.264 profile/level negotiation, packetization mode, and how a
  screen-content track is distinguished from a camera track.
findings: |
  Engine ships screen-content and luma-histogram detectors alongside the
  H.264 NAL handling (likely inputs to screen-content track distinction).
implementations:
  - { flavor: whatsapp-rust, status: unknown }
open_questions:
  - "H.264 profile/level negotiation and packetization mode."
  - "Whether other video codecs are supported."
discovered_by: purpshell
code: ENC-06
changelog:
  - date: 2026-06-21
    version: 0.1.0
    note: Initial spec entry.
