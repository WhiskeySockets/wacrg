id: call-transport
tag: call
display_name: Call Transport Update
category: transport
direction: [outgoing, incoming]
status: draft
spec_version: "0.1.0"
summary: >
  A call-routed stanza carrying ICE/relay transport information used to establish
  and update the media path between peers. It conveys candidate transport endpoints
  (<te>/<endpoint>) describing WhatsApp voip relay (TURN-like) hosts, their IP/port,
  protocol, priority, and measured latency. Both the initiating offer and subsequent
  standalone transport updates can carry this <transport>/<destination> material so
  that each side can pick the lowest-latency relay candidate and react to network
  changes (e.g. Wi-Fi to cellular handover) during an active call. The exact framing
  is still being reconstructed; treat candidate encoding and attribute names as a
  working model rather than confirmed fact.
attributes:
  - name: from
    type: jid
    required: true
    confidence: probable
    description: >
      Sender device JID of the transport update. For server-routed stanzas this is
      rewritten by the server to the originating peer device address.
    provenance:
      techniques: [websocket-capture]
      sources: []
  - name: to
    type: jid
    required: true
    confidence: probable
    description: Destination device JID the transport update is routed to.
    provenance:
      techniques: [websocket-capture]
      sources: []
  - name: id
    type: string
    required: true
    confidence: probable
    description: >
      Stanza id used to correlate the transport update with its server <ack>. Mirrors
      the id-handling of other call stanzas.
    provenance:
      techniques: [websocket-capture]
      sources: []
children:
  - tag: transport
    occurrence: "0..1"
    confidence: speculative
    description: >
      Wrapper for an in-call transport/ICE update sent outside the initial offer.
      Carries an updated set of relay/candidate endpoints when the network path
      changes. We are not yet certain whether updates reuse the <transport> tag or are
      folded into a fresh <offer>/<destination>; both shapes have been hypothesised.
    attributes:
      - name: call-id
        type: string
        required: true
        confidence: probable
        description: Identifier of the call this transport update belongs to.
        provenance:
          techniques: [websocket-capture]
          sources: []
      - name: call-creator
        type: jid
        required: false
        confidence: probable
        description: >
          JID of the device that created the call, used (with call-id) to uniquely
          key the call across both peers and the server.
        provenance:
          techniques: [websocket-capture]
          sources: []
      - name: ver
        type: int
        required: false
        confidence: speculative
        description: >
          Monotonic version/sequence number letting the peer discard stale transport
          updates and apply only the newest candidate set. Presence and naming unconfirmed.
        provenance:
          techniques: [websocket-capture]
          sources: []
    children:
      - tag: destination
        occurrence: "0..1"
        confidence: probable
        description: >
          Container for one or more candidate transport endpoints describing relay
          servers the media stream can be sent to.
        children:
          - tag: te
            occurrence: "0..n"
            confidence: speculative
            description: >
              A single transport-endpoint candidate (abbreviation believed to stand for
              "transport endpoint"). Encodes a relay host address plus selection metadata.
              May appear as <te> or as <endpoint>; the two are treated as the same concept
              here pending confirmation.
            attributes:
              - name: ip
                type: string
                required: false
                confidence: speculative
                description: >
                  IPv4/IPv6 address of the relay candidate. May instead be carried as a
                  raw bytes blob rather than a string attribute.
                observed_values: ["203.0.113.10", "2001:db8::8a2e:370:7334"]
                provenance:
                  techniques: [websocket-capture]
                  sources: []
              - name: port
                type: int
                required: false
                confidence: speculative
                description: UDP port for the relay candidate.
                observed_values: ["3478", "50000"]
                provenance:
                  techniques: [websocket-capture]
                  sources: []
              - name: priority
                type: int
                required: false
                confidence: speculative
                description: >
                  ICE-style priority used to order candidates; higher generally preferred.
                  Whether this follows RFC 8445 priority math is unverified.
                provenance:
                  techniques: [websocket-capture]
                  sources: []
              - name: proto
                type: string
                required: false
                confidence: speculative
                description: Transport protocol hint for the candidate (e.g. udp).
                observed_values: ["udp"]
                provenance:
                  techniques: [websocket-capture]
                  sources: []
              - name: latency
                type: int
                required: false
                confidence: speculative
                description: >
                  Last measured round-trip latency (milliseconds) to this relay, likely
                  populated from <relaylatency> probes to inform candidate selection.
                observed_values: ["28", "64"]
                provenance:
                  techniques: [websocket-capture]
                  sources: []
          - tag: endpoint
            occurrence: "0..n"
            confidence: speculative
            description: >
              Alternate/observed spelling of a relay candidate entry. Listed separately
              because some decodes show <endpoint> rather than <te>; they are believed to
              be the same structure. Resolving which tag is canonical is an open question.
            attributes:
              - name: ip
                type: string
                required: false
                confidence: speculative
                description: Relay candidate address.
                provenance:
                  techniques: [websocket-capture]
                  sources: []
              - name: port
                type: int
                required: false
                confidence: speculative
                description: Relay candidate UDP port.
                provenance:
                  techniques: [websocket-capture]
                  sources: []
examples:
  - title: Illustrative in-call transport update with two relay candidates (synthetic)
    note: Synthetic and sanitized, not a real capture. Candidate encoding is a working hypothesis.
    format: xml
    body: |
      <call from="A.1@s.whatsapp.net" to="B.2@s.whatsapp.net" id="TR-0001">
        <transport call-id="9f86d081" call-creator="A@s.whatsapp.net" ver="3">
          <destination>
            <te ip="203.0.113.10" port="3478" proto="udp" priority="65535" latency="28"/>
            <te ip="198.51.100.5" port="50000" proto="udp" priority="32768" latency="64"/>
          </destination>
        </transport>
      </call>
notes: >
  Media itself is SRTP over UDP and never traverses the signaling WebSocket; only the
  relay/candidate metadata to set up that media path is carried here. The relationship
  between these transport endpoints and the <net> block inside the initial offer is not
  fully mapped.
open_questions:
  - Is the canonical child tag <te>, <endpoint>, or both depending on context?
  - Are candidate IP/port encoded as string attributes or as a packed binary blob?
  - Do in-call updates reuse <transport>, or are they re-sent as a fresh <offer>/<destination>?
  - How does candidate priority relate (if at all) to standard ICE priority computation?
  - Where is the SRTP keying material relative to transport selection, fixed at offer time or renegotiated?
references:
  - title: RFC 8445, Interactive Connectivity Establishment (ICE)
    url: https://www.rfc-editor.org/rfc/rfc8445
  - title: RFC 8656, Traversal Using Relays around NAT (TURN)
    url: https://www.rfc-editor.org/rfc/rfc8656
