id: call-terminate
tag: call
display_name: Call Terminate
category: signaling
direction: [outgoing, incoming, bidirectional]
status: draft
spec_version: "0.1.0"
summary: >
  Ends an existing call or a still-ringing offer. Either party (or the server on
  their behalf) may emit a <call> wrapping a <terminate> child that carries the
  call-id and a machine-readable reason drawn from enum:terminate-reasons (e.g.
  timeout, busy, declined, connection_lost, accept_elsewhere). Terminate covers
  normal hang-ups, unanswered calls that time out, network drops, and the
  multi-device fork resolution where non-answering companion devices are told the
  call was accepted elsewhere. It is bidirectional: the caller can cancel, the
  callee can decline-after-ringing, and the server can tear down on error. Details
  below are a working model, not yet confirmed by a real capture.
attributes:
  - name: from
    type: jid
    required: true
    confidence: probable
    description: JID of the party (or server) ending the call.
    observed_values: ["A@s.whatsapp.net", "B.0:7@s.whatsapp.net"]
    provenance:
      techniques: [websocket-capture]
      sources: []
  - name: to
    type: jid
    required: true
    confidence: probable
    description: JID of the peer the termination is routed to.
    observed_values: ["B@s.whatsapp.net", "A@s.whatsapp.net"]
    provenance:
      techniques: [websocket-capture]
      sources: []
  - name: id
    type: string
    required: true
    confidence: probable
    description: Stanza id used to correlate the server <ack> for this termination.
    observed_values: ["4D5E6F7081"]
    provenance:
      techniques: [websocket-capture]
      sources: []
children:
  - tag: terminate
    occurrence: "1"
    confidence: probable
    description: >
      Container that ends the session. Carries the call-id and the reason. Some
      reasons (e.g. accept_elsewhere) are produced by the server during multi-device
      fork resolution rather than by a peer.
    attributes:
      - name: call-id
        type: string
        required: true
        confidence: probable
        description: The logical call session id being terminated, copied from the offer.
        observed_values: ["CALLID-0001-synthetic"]
        provenance:
          techniques: [websocket-capture, baileys-instrumentation]
          sources: []
      - name: reason
        type: enum:terminate-reasons
        required: false
        confidence: probable
        description: >
          Why the call ended, drawn from enum:terminate-reasons. May be absent on a
          plain user hang-up, where the absence itself implies a normal end-of-call.
        observed_values: ["timeout", "busy", "declined", "connection_lost", "accept_elsewhere"]
        provenance:
          techniques: [websocket-capture, baileys-instrumentation]
          sources: []
      - name: call-creator
        type: jid
        required: false
        confidence: speculative
        description: >
          JID of the original call creator, sometimes echoed for attribution. Whether
          terminate always includes it is unconfirmed.
        observed_values: ["A@s.whatsapp.net"]
        provenance:
          techniques: [websocket-capture]
          sources: []
examples:
  - title: Illustrative caller cancels an unanswered call (synthetic)
    note: >
      Synthetic and sanitized — not a real capture. Shows a timeout termination
      emitted toward the callee after no answer.
    format: xml
    body: |
      <call from="A@s.whatsapp.net" to="B@s.whatsapp.net" id="4D5E6F7081">
        <terminate call-id="CALLID-0001-synthetic" reason="timeout"/>
      </call>
  - title: Illustrative server tears down companion devices after accept (synthetic)
    note: >
      Synthetic and sanitized. After one device accepts, the server is expected to
      terminate the other ringing devices with accept_elsewhere.
    format: xml
    body: |
      <call from="A@s.whatsapp.net" to="B.12:3@s.whatsapp.net" id="4D5E6F7082">
        <terminate call-id="CALLID-0001-synthetic" reason="accept_elsewhere"/>
      </call>
notes: >
  Terminate is the universal shutdown stanza; reject is a more specific pre-answer
  variant. The shared enum:terminate-reasons keeps reject and terminate vocabularies
  aligned so the corpus does not fork two near-identical reason lists.
open_questions:
  - Is reason ever omitted on a normal hang-up, with absence meaning a clean end?
  - Which reasons are peer-originated versus server-originated (e.g. accept_elsewhere, connection_lost)?
  - Does terminate carry any post-call metadata (duration, byte counters) for diagnostics?
references:
  - title: Baileys (WhatsApp Web multi-device library)
    url: https://github.com/WhiskeySockets/Baileys
