# Ingest stanza-capture issues into the corpus.
# When an issue carrying the `type/stanza-capture` label is opened or edited, run
# the ingest script to turn the Issue Form body into a corpus capture YAML, then
# open a pull request with the result for review. A guard `if` ensures the job
# only runs for stanza-capture issues.

name: Issue to corpus

on:
  issues:
    types: [opened, edited]

# Needs to push a branch (contents) and open a PR (pull-requests).
permissions:
  contents: write
  pull-requests: write

concurrency:
  # One ingest run per issue at a time.
  group: issue-to-corpus-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  ingest:
    name: Ingest stanza capture
    runs-on: ubuntu-latest
    # Only process issues labeled type/stanza-capture.
    if: contains(github.event.issue.labels.*.name, 'type/stanza-capture')
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm i

      - name: Ingest issue into corpus
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          # The authenticated GitHub identity of the submitter — recorded as the
          # capture's contributor (the "who" proof, backed by GitHub auth).
          ISSUE_AUTHOR: ${{ github.event.issue.user.login }}
        run: npm run ingest

      - name: Create pull request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: ingest/issue-${{ github.event.issue.number }}
          base: main
          commit-message: "corpus: ingest capture from issue #${{ github.event.issue.number }}"
          title: "Ingest capture from issue #${{ github.event.issue.number }}: ${{ github.event.issue.title }}"
          body: |
            Automated ingestion of stanza-capture issue
            #${{ github.event.issue.number }} into the corpus.

            This PR was generated by the `issue-to-corpus` workflow, which parsed
            the Issue Form body via `scripts/ingest-issue.ts` and wrote a capture
            YAML under `corpus/captures/`.

            Please review the generated capture for accuracy, confirm it is
            sanitized (no real PII or secrets), and adjust confidence/provenance
            before merging.

            Closes #${{ github.event.issue.number }}
          labels: |
            type/stanza-capture
            automated
          delete-branch: true
