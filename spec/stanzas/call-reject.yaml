id: call-reject
tag: call
display_name: Call Reject
category: signaling
direction: [outgoing, incoming]
status: draft
spec_version: "0.1.0"
summary: >
  Sent by a callee device to decline an offered call before it is answered. The
  <call> node wraps a <reject> child echoing the call-id and call-creator and
  carrying a reason. The reject reason vocabulary is shared with terminate via
  enum:terminate-reasons (e.g. declined, busy), so the corpus maintains a single
  reason list rather than two overlapping ones. Reject is the pre-answer counterpart
  to terminate: it tells the caller "I will not take this call now". From the
  declining device this is outgoing; from the caller it is incoming. Details below
  are a working model, not yet confirmed by a real capture.
attributes:
  - name: from
    type: jid
    required: true
    confidence: probable
    description: JID of the callee device declining the call.
    observed_values: ["B.0:7@s.whatsapp.net"]
    provenance:
      techniques: [websocket-capture]
      sources: []
  - name: to
    type: jid
    required: true
    confidence: probable
    description: JID of the caller the rejection is routed to.
    observed_values: ["A@s.whatsapp.net"]
    provenance:
      techniques: [websocket-capture]
      sources: []
  - name: id
    type: string
    required: true
    confidence: probable
    description: Stanza id used to correlate the server <ack> for this rejection.
    observed_values: ["5E6F708192"]
    provenance:
      techniques: [websocket-capture]
      sources: []
children:
  - tag: reject
    occurrence: "1"
    confidence: probable
    description: >
      Container declining the call. Echoes the session identifiers from the offer and
      carries a reason drawn from enum:terminate-reasons. Distinguished from
      terminate by being emitted before any acceptance.
    attributes:
      - name: call-id
        type: string
        required: true
        confidence: probable
        description: The logical call session id being rejected, copied verbatim from the offer.
        observed_values: ["CALLID-0001-synthetic"]
        provenance:
          techniques: [websocket-capture, baileys-instrumentation]
          sources: []
      - name: call-creator
        type: jid
        required: true
        confidence: probable
        description: JID of the call creator (the caller), copied from the offer for attribution.
        observed_values: ["A@s.whatsapp.net"]
        provenance:
          techniques: [websocket-capture]
          sources: []
      - name: reason
        type: enum:terminate-reasons
        required: false
        confidence: probable
        description: >
          Why the call was rejected, drawn from the shared enum:terminate-reasons
          (most commonly declined or busy). Reusing the terminate enum keeps the
          reason vocabularies aligned across both stanzas.
        observed_values: ["declined", "busy"]
        provenance:
          techniques: [websocket-capture, baileys-instrumentation]
          sources: []
examples:
  - title: Illustrative user declines an incoming call (synthetic)
    note: >
      Synthetic and sanitized — not a real capture. Shows a declined rejection routed
      back to the caller while the call is still ringing.
    format: xml
    body: |
      <call from="B.0:7@s.whatsapp.net" to="A@s.whatsapp.net" id="5E6F708192">
        <reject call-id="CALLID-0001-synthetic" call-creator="A@s.whatsapp.net" reason="declined"/>
      </call>
notes: >
  Reject and terminate are closely related; the practical distinction is timing
  (reject happens before acceptance) and that reject is always peer-originated. They
  deliberately share enum:terminate-reasons so a future capture only needs to extend
  one enum. If captures show reject uses a strictly smaller reason set, that subset
  can be documented in the enum's value confidence rather than by forking a new enum.
open_questions:
  - Does reject use the full enum:terminate-reasons set, or only a declined/busy subset?
  - Is there a separate "auto-reject" reason (e.g. do-not-disturb / blocked) distinct from user decline?
  - After reject, does the server also emit terminate to the caller, or is reject sufficient on its own?
references:
  - title: Baileys (WhatsApp Web multi-device library)
    url: https://github.com/WhiskeySockets/Baileys
