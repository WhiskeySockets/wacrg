    }
open_questions:
  - "Exact caller-side transport-message-type handshake sequence (which
    <transport> rounds the caller initiates vs. answers) to converge the media
    path."
  - "Precise trigger that promotes an accepted call into the active RTP/media
    phase on the caller side."
  - "Whether the caller must explicitly hang up the non-answering callee devices
    (e.g. a terminate with reason) once one device accepts a multi-device
    offer."
  - "Timeout/retry behaviour if no offer receipt, preaccept, or accept arrives
    within a ringing window."
references:
