id: "video-call"
category: signalling
title: "Video call negotiation"
status: draft
order: 11
features: [ audio, video ]
since: "0.1.0"
summary: >
  A call is video-capable iff its `<offer>` carries a `<video>` child; the group
  fan-out notice signals video via `media="video"`.
normative: |
  **1:1 offer.** A video-capable `<offer>` MUST carry a `<video>` child in addition
  to its `<audio enc="opus" rate="…">` advertisements (see [call-offer](call-offer)).
  The `<video>` marker is additive: the `<audio>` advertisements are identical in the
  audio-only and video cases.

      <offer call-id call-creator>
        <audio enc="opus" rate="8000"/>
        <audio enc="opus" rate="16000"/>
        <video/>                          <!-- present ⇒ video call -->
      </offer>

  - A receiver MUST treat the call as video iff the `<offer>` contains at least one
    `<video>` child, audio-only otherwise (`is_video = any child tag == "video"`).
  - A receiver MUST NOT require any attribute on `<video>`; element presence is the signal.
  - A receiver MUST parse and honour the `<audio>` advertisements of a video offer
    exactly as for an audio-only offer.

  **Group fan-out notice.** A video call announced via `<offer_notice>`
  (see [group-call](group-call)) carries `media="video"` as an attribute (not a child;
  audio uses `media="audio"`). A receiver MUST treat the call as video iff
  `media == "video"`. `type == "group"` independently marks it a group call.

  **Answering.** The callee answers a video offer with the same `<preaccept>` /
  `<accept>` handshake as audio-only (see [call-accept](call-accept),
  [call-preaccept](call-preaccept)); the accept negotiates the `<audio>` rate as usual.
  No video-specific child in `<accept>` is required to accept the audio portion.
requires: [ call-offer, group-call, call-accept, call-preaccept ]
implementations:
  - {
      flavor: whatsapp-rust,
      status: working,
      note: "Parses the <video> child (is_video) on <offer> and media=\"video\" on
        <offer_notice>; inbound recognition.",
      commits: [ 674e85164b35ca19115dfebcf605708d15951ee7 ],
      path: wacore/src/voip/stanza.rs
    }
  - {
      flavor: zapo-caller,
      status: partial,
      note: "Signalling/relay stack present; video-offer construction not covered."
    }
open_questions:
  - "Attributes (if any) carried on the <video> child of <offer> — e.g. codec,
    resolution, or orientation hints — and whether the server enforces them."
  - "Whether a video-capable <accept> carries a reciprocal <video> child or
    other video-specific element to confirm acceptance of the video track."
  - "How mid-call escalation from audio-only to video is signalled (e.g. a
    renegotiation stanza vs. a fresh offer)."
  - "Whether the offer's child-order rule (439 on mis-order) fixes the position
    of the <video> element relative to the <audio> nodes."
references:
  - { title: "RFC 3711 — SRTP", url: "https://www.rfc-editor.org/rfc/rfc3711" }
code: SIG-02
changelog:
  - date: 2026-06-21
    note: Initial spec entry.
contributors:
