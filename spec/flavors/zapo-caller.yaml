id: zapo-caller
name: zapo-caller
language: typescript
maturity: working
maintainer: vinikjkkj
status: stable
covers:
  - signaling
  - keying
  - transport
basis:
  - wasm-analysis
  - frida-hooking
description: >
  A TypeScript reconstruction of the WhatsApp call client (caller side), created by
  Vini (vinikjkkj) with community contributors Auties, Edgard, and Sheiitear.
  Implements the call signaling,
  callKey/SRTP/SFrame/WARP keying, STUN/relay transport, and RTP framing, with
  primitives pinned to known-answer vectors. The upstream source that the
  whatsapp-rust VoIP crypto and signaling were ported from. An independent
  reconstruction, not an evidence-gathering tool.
