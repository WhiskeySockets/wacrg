id: outgoing-1to1-audio
title: Outgoing 1:1 audio call
status: draft
spec_version: "0.1.0"
summary: >
  The happy-path sequence for placing a 1:1 audio call from the local (caller) device to a
  remote contact that answers. The caller sends a server-routed <call><offer> carrying media
  descriptors, transport candidates, and one or more <enc> nodes wrapping the call/media key
  for each callee device. The server acks the offer and routes it to the callee's device(s),
  which may ring (<preaccept>) and then <accept>. Once accepted, both sides derive SRTP keys
  from the Signal-delivered call key and media flows over UDP relays, with relay-latency and
  transport updates tuning the path. Step ordering and which hops are acked are a working
  model; confidence is hedged per step.
participants:
  - id: caller
    label: Caller (initiating device)
  - id: server
    label: WhatsApp server
  - id: callee
    label: Callee device
steps:
  - from: caller
    to: server
    stanza: call-offer
    label: <call><offer> with media, transport, and per-device <enc> call key
    confidence: probable
    note: >
      Offer includes <audio> descriptor, <net>/<capability>, <encopt>, transport candidates,
      and an <enc> (type pkmsg or msg) per callee device wrapping the call/media key.
  - from: server
    to: caller
    stanza: call-ack
    label: <ack class="call"> for the offer
    confidence: probable
    note: Confirms the offer entered the routing fabric; absence triggers retransmission.
  - from: server
    to: callee
    stanza: call-offer
    label: routed <call><offer> delivered to callee device(s)
    confidence: probable
    note: Server relays the offer to each linked callee device that should ring.
  - from: callee
    to: server
    stanza: call-ack
    label: <ack class="call"> acknowledging receipt of the offer
    confidence: speculative
    note: Whether the callee device acks the offer to the server is not fully confirmed.
  - from: callee
    to: caller
    stanza: call-preaccept
    label: <preaccept> (ringing / early indication)
    confidence: speculative
    note: Optional early signal that the callee is ringing before the user answers.
  - from: caller
    to: callee
    stanza: call-relaylatency
    label: <relaylatency> relay probe results exchanged
    confidence: speculative
    note: Both sides may probe candidate relays to select the lowest-latency path.
  - from: callee
    to: caller
    stanza: call-accept
    label: <accept> — callee user answers
    confidence: probable
    note: Callee accepts; both sides now have the shared call key to derive SRTP keys.
  - from: caller
    to: callee
    stanza: call-transport
    label: <transport><destination> chosen relay candidate(s)
    confidence: speculative
    note: Final transport/relay selection so SRTP media can begin over UDP.
  - from: caller
    to: callee
    label: SRTP audio media flows over UDP relay (off the WebSocket)
    confidence: probable
    note: Media is not WABinary; shown here only to mark where the call becomes active.
  - from: caller
    to: callee
    stanza: call-terminate
    label: <terminate> when either party hangs up
    confidence: probable
    note: Ends the call; reason typically a normal hang-up rather than timeout/busy.
open_questions:
  - Is <preaccept> always emitted, or only under certain network/UI conditions?
  - Which hops require an <ack> versus being best-effort?
  - Does relay selection complete before or after <accept>?
  - Are transport candidates re-sent after accept, or only carried in the original offer?
