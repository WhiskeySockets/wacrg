# First-interaction greeter — welcomes a contributor's very first issue.
# (First-time pull requests are welcomed by the PR Comment bot.)
name: Greetings

on:
  issues:
    types: [opened]

permissions:
  issues: write
  pull-requests: write

jobs:
  greeting:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/first-interaction@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: >-
            Welcome, and thanks for your first issue in the WhatsApp Calls
            Research Group! If this is a captured stanza or a behavioral finding,
            the structured Issue Forms feed it straight into the corpus. Please
            keep all data **synthetic or fully sanitized** (no real PII or keys),
            and see CONTRIBUTING.md for the confidence/provenance rules. A
            maintainer will take a look shortly.
          pr-message: >-
            Welcome, and thanks for your first pull request!
