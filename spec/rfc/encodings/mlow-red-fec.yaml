      flavor: whatsapp-rust,
      status: working,
      note: "depack_split_red parses the RED envelope; bare-frame streams bypass it"
    }
  - { flavor: meowcaller, status: partial, note: "codec modules partial" }
open_questions:
  - "On-wire encoding of the Reed-Solomon FEC tier: generator polynomial,
    symbol/block size, and parity layout."
  - "Negotiation signalling that sets mlow_red_redundancy_level and enables
    Reed-Solomon FEC."
  - "Semantics of time_code relative to RTP timestamp / frame sequence, and the
    receiver's repair (jitter-buffer) policy for selecting a redundant copy."
  - "Encoder side: how many redundant copies are emitted per level and which
    past frames are chosen."
references:
  - {
      title: "RFC 2198 — RTP Payload for Redundant Audio Data",
      url: "https://www.rfc-editor.org/rfc/rfc2198"
    }
